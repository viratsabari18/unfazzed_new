name: zeerah
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  carousel_slider: ^5.1.2
  flutter_card_swiper: ^7.2.0
  google_maps_flutter: ^2.12.3
  geolocator: ^13.0.1
  provider: ^6.1.5+1
  intl: ^0.20.1
  http: ^1.2.1
  geocoding: ^4.0.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7
  file_picker: ^11.0.1
  shared_preferences: ^2.5.1
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.2
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.1.2
  cloud_firestore: ^5.1.0
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.1
  razorpay_flutter: ^1.4.5
  smooth_page_indicator: ^1.2.0+3
  flutter_html: ^3.0.0-beta.2
  share_plus: ^10.0.2
  flutter_polyline_points: ^2.1.0
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  card_swiper: ^3.0.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_native_splash:
  color: "#DB0008"

  image: lib/assets/icon/icon_app1.jpg

  android: true
  ios: true

  android_12:
    color: "#DB0008"
    image: lib/assets/icon/icon_app1.jpg


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon/icon_app1.jpg"




flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/


  fonts:
  - family: Inter
    fonts:
      - asset: lib/assets/fonts/Inter-Light.ttf
        weight: 300
      - asset: lib/assets/fonts/Inter-Medium.ttf
        weight: 500
      - asset: lib/assets/fonts/Inter-SemiBold.ttf
        weight: 600
      - asset: lib/assets/fonts/Inter-Bold.ttf
        weight: 700